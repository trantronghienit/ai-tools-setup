name: open-design

services:
  open-design:
    container_name: open-design
    build:
      context: .
      dockerfile: Dockerfile.daemon
    image: open-design:local
    restart: always
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=192}
      HOME: /home/open-design
      OD_BIND_HOST: 0.0.0.0
      OD_ALLOWED_ORIGINS: ${OPEN_DESIGN_ALLOWED_ORIGINS:-}
      OD_PORT: 7456
      OD_WEB_PORT: ${OPEN_DESIGN_PORT:-7456}
      OD_API_TOKEN: ${OD_API_TOKEN:?Please run 'openssl rand -hex 32' to generate one, and set it in your .env file.}
      OD_CODEX_SANDBOX: ${OD_CODEX_SANDBOX:-}
    volumes:
      - open_design_data:/app/.od
    read_only: true
    tmpfs:
      - /tmp
      - /home/open-design:uid=1001,gid=1001
    security_opt:
      - no-new-privileges:true
    mem_limit: ${OPEN_DESIGN_MEM_LIMIT:-384m}
    pids_limit: 256
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:7456/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  proxy:
    container_name: open-design-proxy
    build:
      context: .
      dockerfile: Dockerfile.proxy
    ports:
      - "127.0.0.1:${OPEN_DESIGN_PORT:-7456}:7456"
    environment:
      DAEMON_HOST: open-design
      DAEMON_PORT: "7456"
      PORT: "7456"
      OD_API_TOKEN: ${OD_API_TOKEN}
    depends_on:
      open-design:
        condition: service_healthy
    restart: unless-stopped

  tools:
    container_name: open-design-tools
    build:
      context: ..
      dockerfile: deploy/Dockerfile.tools
    depends_on:
      open-design:
        condition: service_healthy
    network_mode: "service:open-design"
    environment:
      OD_DAEMON_URL: http://127.0.0.1:7456
      OD_API_TOKEN: ${OD_API_TOKEN}
    volumes:
      - open_design_data:/app/.od:ro
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  open_design_data:
